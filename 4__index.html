<title>GATE CS Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Unbounded:wght@400;600;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#090b10;--surface:#0e1118;--surface2:#141820;--surface3:#1c2130;
  --border:#1f2535;--border2:#2a3348;--text:#dde2f0;--muted:#5a6480;
  --muted2:#3d4560;--accent:#e8ff47;--accent2:#b8cc30;--blue:#4a9eff;
  --cyan:#00d4ff;--green:#39e589;--orange:#ff8c42;--red:#ff5757;
  --purple:#a78bfa;--gold:#ffd700;
  --mono:'JetBrains Mono',monospace;--display:'Unbounded',sans-serif;--body:'Manrope',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;overflow-x:hidden;}

/* ── LOGIN ── */
.login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;}
.login-overlay.hidden{display:none;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;max-width:440px;width:100%;}

/* logo in login */
.login-logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;gap:10px;}
.logo-circle{width:80px;height:80px;border-radius:50%;overflow:hidden;border:2px solid var(--gold);flex-shrink:0;}
.logo-circle img{width:100%;height:100%;object-fit:cover;}
.logo-gate{display:none;}
.logo-cs{display:none;}
.login-title-text{font-family:var(--display);font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;}
.login-tagline{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}

.form-group{margin-bottom:14px;}
.form-label{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:11px 14px;border-radius:8px;font-family:var(--body);font-size:14px;transition:border-color 0.2s;}
.form-input:focus{outline:none;border-color:var(--accent);background:var(--surface3);}
.form-input.err{border-color:var(--red);}
.login-btns{display:flex;gap:10px;margin-top:20px;}
.btn-main{flex:1;padding:12px;border:none;border-radius:8px;font-family:var(--mono);font-weight:700;font-size:12px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:1px;background:var(--accent);color:#000;}
.btn-main:hover:not(:disabled){background:var(--accent2);}
.btn-main:disabled{opacity:0.5;cursor:not-allowed;}
.btn-sec{flex:1;padding:12px;border:1.5px solid var(--border2);border-radius:8px;font-family:var(--mono);font-weight:700;font-size:12px;cursor:pointer;background:transparent;color:var(--muted);transition:all 0.2s;text-transform:uppercase;letter-spacing:1px;}
.btn-sec:hover{border-color:var(--accent);color:var(--accent);}
.auth-msg{margin-top:14px;padding:11px 14px;border-radius:8px;font-size:13px;text-align:center;display:none;line-height:1.5;}
.auth-msg.err{background:rgba(255,87,87,0.1);color:var(--red);border:1px solid rgba(255,87,87,0.35);display:block;}
.auth-msg.ok{background:rgba(57,229,137,0.1);color:var(--green);border:1px solid rgba(57,229,137,0.35);display:block;}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:200;background:rgba(9,11,16,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:58px;gap:16px;}
.topbar-logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.tlogo-circle{width:36px;height:36px;border-radius:50%;overflow:hidden;border:1.5px solid var(--gold);flex-shrink:0;}
.tlogo-circle img{width:100%;height:100%;object-fit:cover;}
.tlogo-gate{display:none;}
.tlogo-cs{display:none;}
.topbar-brand{font-family:var(--display);font-size:12px;font-weight:800;color:var(--accent);}
.topbar-brand span{color:var(--muted);font-weight:400;}
.topbar-stats{display:flex;flex:1;overflow-x:auto;}
.stat-item{display:flex;flex-direction:column;justify-content:center;padding:0 14px;border-right:1px solid var(--border);min-width:80px;}
.stat-item:first-child{border-left:1px solid var(--border);}
.stat-val{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--accent);line-height:1;}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:4px 12px 4px 4px;}
.user-badge{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0;}
.user-name{font-family:var(--mono);font-size:11px;color:var(--text);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.icon-btn{font-family:var(--mono);font-size:11px;background:transparent;border:1px solid var(--border2);color:var(--muted);padding:6px 12px;border-radius:6px;cursor:pointer;transition:all 0.15s;}
.icon-btn:hover{border-color:var(--red);color:var(--red);}

/* ── LAYOUT ── */
.page{display:flex;min-height:calc(100vh - 58px);position:relative;z-index:1;}
.sidebar{width:210px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:14px 0;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;display:flex;flex-direction:column;gap:1px;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);}
.nav-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted2);padding:10px 16px 5px;}
.nav-sep{height:1px;background:var(--border);margin:6px 14px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);border-left:3px solid transparent;transition:all 0.12s;white-space:nowrap;overflow:hidden;}
.nav-item:hover{color:var(--text);background:var(--surface2);border-left-color:var(--border2);}
.nav-item.active{color:var(--accent);background:rgba(232,255,71,0.05);border-left-color:var(--accent);}
.nav-ring{flex-shrink:0;width:28px;height:28px;position:relative;}
.nav-pct{font-family:var(--mono);font-size:9px;font-weight:700;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:inherit;}
.main{flex:1;padding:28px;overflow-y:auto;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.main>*{animation:fi 0.2s ease both;}

/* ── HOME ── */
.summary-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:26px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;}
.sum-val{font-family:var(--mono);font-size:24px;font-weight:700;}
.sum-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.sum-bar{height:3px;border-radius:99px;background:var(--border2);overflow:hidden;margin-top:8px;}
.sum-bar-fill{height:100%;border-radius:99px;}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.home-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.home-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(232,255,71,0.03),transparent 60%);pointer-events:none;}
.home-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.home-card-name{font-family:var(--display);font-size:12px;font-weight:800;color:var(--text);margin-bottom:10px;}
.home-card-bars{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.hbar-row{display:flex;align-items:center;gap:8px;}
.hbar-label{font-family:var(--mono);font-size:9px;color:var(--muted);width:54px;flex-shrink:0;}
.hbar-bg{flex:1;height:4px;background:var(--border2);border-radius:99px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:99px;}
.hbar-fill.s{background:var(--blue);}
.hbar-fill.p{background:var(--orange);}
.hbar-fill.pr{background:var(--green);}
.hbar-pct{font-family:var(--mono);font-size:9px;color:var(--muted);width:26px;text-align:right;}
.home-card-footer{display:flex;justify-content:space-between;align-items:center;}
.hc-topics{font-family:var(--mono);font-size:10px;color:var(--muted);}

/* ── SUBJECT ── */
.subject-header{margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.subject-tag{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;}
.subject-title{font-family:var(--display);font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.5px;}
.subject-meta{display:flex;gap:12px;margin-top:10px;}
.meta-badge{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:99px;background:var(--surface3);color:var(--muted);border:1px solid var(--border2);}
.meta-badge.green{background:rgba(57,229,137,0.08);color:var(--green);border-color:rgba(57,229,137,0.2);}
.meta-badge.blue{background:rgba(74,158,255,0.08);color:var(--blue);border-color:rgba(74,158,255,0.2);}
.meta-badge.orange{background:rgba(255,140,66,0.08);color:var(--orange);border-color:rgba(255,140,66,0.2);}
.progress-row{display:flex;gap:12px;margin-bottom:22px;flex-wrap:wrap;}
.prog-card{flex:1;min-width:130px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.prog-card-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.prog-bar-bg{height:6px;background:var(--border2);border-radius:99px;overflow:hidden;margin-bottom:6px;}
.prog-bar-fill{height:100%;border-radius:99px;transition:width 0.4s ease;}
.prog-bar-fill.study{background:linear-gradient(90deg,var(--blue),var(--cyan));}
.prog-bar-fill.pyq{background:linear-gradient(90deg,var(--orange),#ffb347);}
.prog-bar-fill.practice{background:linear-gradient(90deg,var(--green),#7fffbc);}
.prog-pct{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--text);}
.prog-sub{font-family:var(--mono);font-size:10px;color:var(--muted);}
.tests-row{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
.test-pill{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:8px;background:var(--surface);border:1.5px solid var(--border);cursor:pointer;transition:all 0.15s;font-size:13px;font-weight:600;color:var(--muted);}
.test-pill:hover{border-color:var(--border2);color:var(--text);}
.test-pill.done{border-color:var(--green);color:var(--green);background:rgba(57,229,137,0.06);}
.tp-check{width:18px;height:18px;border-radius:5px;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;}
.test-pill.done .tp-check{background:var(--green);color:#000;}
.topics-header{display:grid;grid-template-columns:1fr 100px 100px 100px;gap:8px;padding:8px 12px;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.topic-row{display:grid;grid-template-columns:1fr 100px 100px 100px;gap:8px;padding:10px 12px;border-radius:7px;transition:background 0.1s;align-items:center;border:1px solid transparent;}
.topic-row:hover{background:var(--surface2);border-color:var(--border);}
.topic-row.all-done{background:rgba(57,229,137,0.04);border-color:rgba(57,229,137,0.1);}
.topic-name{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px;}
.done-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
.action-cell{display:flex;justify-content:center;}
.action-cb{appearance:none;width:22px;height:22px;border-radius:6px;border:2px solid var(--border2);background:transparent;cursor:pointer;position:relative;transition:all 0.12s;flex-shrink:0;}
.action-cb:checked{border-color:transparent;}
.action-cb.study-cb:checked{background:var(--blue);}
.action-cb.pyq-cb:checked{background:var(--orange);}
.action-cb.practice-cb:checked{background:var(--green);}
.action-cb:checked::before{content:'✓';position:absolute;font-size:13px;font-weight:700;color:#000;left:50%;top:50%;transform:translate(-50%,-50%);}
.sec-title{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;}

/* ── MOCKS ── */
.mocks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;}
.mock-card{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:12px 14px;display:flex;align-items:center;gap:10px;transition:border-color 0.13s;}
.mock-card:hover{border-color:var(--border2);}
.mock-card.done{border-color:rgba(57,229,137,0.3);background:rgba(57,229,137,0.04);}
.mock-num{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--muted);min-width:54px;}
.mock-card.done .mock-num{color:var(--green);}
.mock-cb{appearance:none;width:20px;height:20px;border-radius:5px;border:2px solid var(--border2);cursor:pointer;position:relative;flex-shrink:0;transition:all 0.12s;}
.mock-cb:checked{background:var(--green);border-color:var(--green);}
.mock-cb:checked::before{content:'✓';position:absolute;font-size:11px;font-weight:700;color:#000;left:50%;top:50%;transform:translate(-50%,-50%);}
.mock-marks{flex:1;background:var(--surface3);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:5px 8px;font-family:var(--mono);font-size:12px;outline:none;min-width:0;}
.mock-marks:focus{border-color:var(--accent);}
.mock-marks::placeholder{color:var(--muted2);}

/* ── GRAPH ── */
.graph-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px;}
.graph-title{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.graph-trend{font-size:10px;padding:2px 8px;border-radius:99px;font-family:var(--mono);}
.graph-trend.up{background:rgba(57,229,137,0.12);color:var(--green);}
.graph-trend.down{background:rgba(255,87,87,0.12);color:var(--red);}
.graph-trend.flat{background:rgba(90,100,128,0.15);color:var(--muted);}
.graph-area{position:relative;height:180px;}
canvas#mockGraph{width:100%;height:100%;}
.graph-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-family:var(--mono);font-size:12px;}
.graph-stats{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;}
.gstat{text-align:center;flex:1;}
.gstat-val{font-family:var(--mono);font-size:18px;font-weight:700;}
.gstat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

/* toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border2);color:var(--muted);font-family:var(--mono);font-size:11px;padding:8px 16px;border-radius:8px;z-index:5000;opacity:0;transition:opacity 0.25s;pointer-events:none;}
.toast.show{opacity:1;}
.toast.ok{color:var(--green);border-color:rgba(57,229,137,0.4);}
.toast.warn{color:var(--orange);border-color:rgba(255,140,66,0.4);}

@media(max-width:700px){
  .sidebar{display:none;}
  .topbar{padding:0 12px;}
  .topbar-brand{display:none;}
  .main{padding:14px;}
  .summary-row{grid-template-columns:repeat(3,1fr);}
  .topics-header,.topic-row{grid-template-columns:1fr 70px 70px 70px;}
}

/* ── SECTION NAV ── */
.sec-nav{display:flex;align-items:center;gap:6px;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
.sec-nav::-webkit-scrollbar{display:none;}
.sec-btn{font-family:var(--mono);font-size:11px;font-weight:700;padding:10px 16px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.8px;}
.sec-btn:hover{color:var(--text);}
.sec-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── LAYOUT CHANGES ── */
.page{display:flex;min-height:calc(100vh - 58px - 38px);}
.sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:14px 0;position:sticky;top:96px;height:calc(100vh - 96px);overflow-y:auto;display:flex;flex-direction:column;gap:1px;}
.sidebar.hidden{display:none;}

/* ── TIFFIN ── */
.tf-topbar{background:linear-gradient(135deg,#7C2D12,#9A3412);border-radius:12px;padding:18px 20px;margin-bottom:20px;position:relative;overflow:hidden;}
.tf-topbar::after{content:'🍱';position:absolute;right:16px;top:10px;font-size:2.5rem;opacity:.2;}
.tf-topbar h2{font-family:var(--display);font-size:18px;font-weight:800;color:#FFE4B5;margin-bottom:3px;}
.tf-topbar p{font-size:11px;color:#F4C48A;}
.tf-sum{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.tf-sc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.tf-sv{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);}
.tf-sv.r{color:var(--red);}.tf-sv.g{color:var(--green);}
.tf-sl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.tf-sec-title{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:20px 0 10px;}
.tf-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;}
.tf-mhdr{background:#7C2D12;color:#FFE4B5;font-weight:700;font-size:13px;padding:9px 16px;display:flex;justify-content:space-between;align-items:center;}
.tf-mhdr span{font-size:11px;color:#F4C48A;font-weight:400;}
.tf-dgrid{display:grid;grid-template-columns:repeat(7,1fr);padding:10px 8px 8px;gap:3px;}
.tf-dl{text-align:center;font-size:9px;color:var(--muted);text-transform:uppercase;padding-bottom:4px;font-weight:600;}
.tf-dc{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;font-size:10px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:transform .12s;user-select:none;position:relative;}
.tf-dc:hover{transform:scale(1.12);z-index:2;}
.tf-dc.emp,.tf-dc.bef,.tf-dc.fut{background:transparent;border:none;color:var(--muted2);cursor:default;}
.tf-dc.emp:hover,.tf-dc.bef:hover,.tf-dc.fut:hover{transform:none;}
.tf-dc.non{background:var(--surface2);border-color:var(--border2);color:var(--muted);}
.tf-dc.mor{background:rgba(57,229,137,0.12);border-color:var(--green);color:var(--green);}
.tf-dc.eve{background:rgba(255,215,0,0.1);border-color:#FFC107;color:#FFC107;}
.tf-dc.bot{background:rgba(74,158,255,0.12);border-color:var(--blue);color:var(--blue);}
.tf-dc.zero{background:rgba(255,87,87,0.12);border-color:var(--red);color:var(--red);box-shadow:0 0 0 2px rgba(255,87,87,0.3);}
.tf-dc .dn{font-size:10px;line-height:1;}
.tf-dc .mi{font-size:8px;margin-top:1px;opacity:.9;}
.tf-pay-list{list-style:none;}
.tf-pay-list li{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);}
.tf-pay-list li:last-child{border-bottom:none;}
.tf-pmeta{color:var(--muted);font-size:11px;margin-top:2px;}
.tf-pamt{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--green);}
.tf-del{background:none;border:none;cursor:pointer;color:var(--muted2);font-size:12px;margin-left:8px;padding:2px 6px;border-radius:6px;}
.tf-del:hover{color:var(--red);background:rgba(255,87,87,0.1);}
.tf-add-row{display:flex;gap:7px;padding:10px 12px;background:var(--surface2);border-top:1px dashed var(--border2);flex-wrap:wrap;}
.tf-add-row input{flex:1;min-width:80px;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface3);color:var(--text);outline:none;font-family:var(--body);}
.tf-add-row input:focus{border-color:var(--accent);}
.tf-add-row button{padding:7px 14px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;font-family:var(--mono);}
.tf-add-row button:hover{background:var(--accent2);}
.tf-btable{width:100%;border-collapse:collapse;font-size:12px;}
.tf-btable th{background:#7C2D12;color:#FFE4B5;padding:8px 12px;text-align:left;font-size:11px;font-family:var(--mono);}
.tf-btable td{padding:9px 12px;border-bottom:1px solid var(--border);font-family:var(--mono);}
.tf-btable tr:last-child td{border-bottom:none;}
.tf-bamt{font-weight:700;}.tf-bdue{color:var(--red);}.tf-bpaid{color:var(--green);}
.tf-legend{display:flex;flex-wrap:wrap;gap:8px;padding:6px 10px 12px;font-size:11px;color:var(--muted);}
.tf-li{display:flex;align-items:center;gap:5px;}
.tf-ld{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;}

/* ── MOBILE ── */
@media(max-width:700px){
  .topbar{padding:0 12px;}
  .topbar-brand{display:none;}
  .sec-btn{padding:10px 12px;font-size:10px;}
  .sidebar{display:none !important;}
  .main{padding:14px;}
  .summary-row{grid-template-columns:repeat(3,1fr);}
  .topics-header,.topic-row{grid-template-columns:1fr 60px 60px 60px;}
  .tf-sum{grid-template-columns:repeat(3,1fr);}
  .stat-item{padding:0 8px;min-width:60px;}
  .stat-val{font-size:14px;}
}

/* ── SCHEDULE ── */
.sch-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.sch-stat{text-align:center;}
.sch-stat-val{font-family:var(--mono);font-size:22px;font-weight:700;}
.sch-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.sch-progress-wrap{flex:1;min-width:120px;max-width:200px;}
.sch-pbar{height:6px;background:var(--border2);border-radius:99px;overflow:hidden;margin-top:6px;}
.sch-pbar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:99px;transition:width 0.4s;}
.sch-pbar-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px;}
.sch-layout{display:flex;gap:0;}
.sch-sidebar{width:170px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-right:16px;}
.sch-sidebar-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted2);margin-bottom:8px;}
.sch-pill{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:600;color:var(--muted);border:1px solid transparent;margin-bottom:2px;}
.sch-pill-count{font-family:var(--mono);font-size:10px;color:var(--muted2);}
.sch-main{flex:1;min-width:0;}
.backlog-box{background:rgba(255,87,87,0.06);border:1.5px solid rgba(255,87,87,0.3);border-radius:10px;padding:14px 18px;margin-bottom:18px;}
.backlog-title{font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px;}
.backlog-item{font-size:12px;color:var(--text);padding:5px 0;border-bottom:1px solid rgba(255,87,87,0.1);display:flex;gap:8px;align-items:center;cursor:pointer;}
.backlog-item:last-child{border-bottom:none;}
.month-section{margin-bottom:32px;}
.month-hdr{font-family:var(--display);font-size:18px;font-weight:800;color:var(--text);margin-bottom:12px;display:flex;align-items:baseline;gap:10px;}
.month-hdr span{font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:400;letter-spacing:1px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);padding:4px 0 6px;}
.cal-day{min-height:52px;border-radius:7px;background:var(--surface);border:1.5px solid var(--border);padding:5px 6px;cursor:pointer;transition:border-color 0.12s;position:relative;}
.cal-day:hover{border-color:var(--border2);}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-day.is-today{background:rgba(74,158,255,0.1);border-color:var(--blue);}
.cal-day.is-past{opacity:0.5;}
.cal-day.all-done{border-color:var(--green);background:rgba(57,229,137,0.05);}
.cal-day-num{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px;}
.cal-day.is-today .cal-day-num{color:var(--blue);}
.today-dot{position:absolute;top:4px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--blue);}
.task-chip{font-size:9px;border-radius:3px;padding:1px 4px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;cursor:pointer;margin-bottom:1px;display:block;}
.task-chip.done{text-decoration:line-through;opacity:0.4;}
.task-chip.subject{background:rgba(74,158,255,0.15);color:var(--blue);}
.task-chip.zeal{background:rgba(0,212,255,0.12);color:var(--cyan);border:1px solid rgba(0,212,255,0.25);}
.task-chip.test{background:rgba(255,140,66,0.12);color:var(--orange);}
.sch-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;align-items:center;justify-content:center;}
.sch-modal-overlay.open{display:flex;}
.sch-modal{background:var(--surface2);border:1.5px solid var(--border2);border-radius:14px;padding:24px;min-width:300px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.sch-modal-date{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:5px;}
.sch-modal-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px;}
.sch-modal-task{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--surface);margin-bottom:6px;cursor:pointer;border:1.5px solid var(--border);transition:border-color 0.12s;}
.sch-modal-task:hover{border-color:var(--border2);}
.sch-modal-task.done{opacity:0.5;}
.sch-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;}
.sch-modal-task.done .sch-check{background:var(--green);border-color:var(--green);color:#000;}
.sch-modal-close{margin-top:14px;width:100%;padding:10px;background:var(--border2);border:none;color:var(--text);border-radius:8px;font-family:var(--mono);font-size:13px;cursor:pointer;}
/* ── TIFFIN ── */
.tf-topbar{background:linear-gradient(135deg,#7C2D12,#9A3412);border-radius:12px;padding:18px 20px;margin-bottom:20px;position:relative;overflow:hidden;}
.tf-topbar::after{content:'🍱';position:absolute;right:16px;top:10px;font-size:2.5rem;opacity:.2;}
.tf-topbar h2{font-family:var(--display);font-size:18px;font-weight:800;color:#FFE4B5;margin-bottom:3px;}
.tf-topbar p{font-size:11px;color:#F4C48A;}
.tf-sum{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.tf-sc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.tf-sv{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);}
.tf-sv.r{color:var(--red);}.tf-sv.g{color:var(--green);}
.tf-sl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.tf-sec-title{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:20px 0 10px;}
.tf-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;}
.tf-mhdr{background:#7C2D12;color:#FFE4B5;font-weight:700;font-size:13px;padding:9px 16px;display:flex;justify-content:space-between;align-items:center;}
.tf-mhdr span{font-size:11px;color:#F4C48A;font-weight:400;}
.tf-dgrid{display:grid;grid-template-columns:repeat(7,1fr);padding:10px 8px 8px;gap:3px;}
.tf-dl{text-align:center;font-size:9px;color:var(--muted);text-transform:uppercase;padding-bottom:4px;font-weight:600;}
.tf-dc{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;font-size:10px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:transform .12s;user-select:none;position:relative;}
.tf-dc:hover{transform:scale(1.12);z-index:2;}
.tf-dc.emp,.tf-dc.bef,.tf-dc.fut{background:transparent;border:none;color:var(--muted2);cursor:default;}
.tf-dc.emp:hover,.tf-dc.bef:hover,.tf-dc.fut:hover{transform:none;}
.tf-dc.non{background:var(--surface2);border-color:var(--border2);color:var(--muted);}
.tf-dc.mor{background:rgba(57,229,137,0.12);border-color:var(--green);color:var(--green);}
.tf-dc.eve{background:rgba(255,215,0,0.1);border-color:#FFC107;color:#FFC107;}
.tf-dc.bot{background:rgba(74,158,255,0.12);border-color:var(--blue);color:var(--blue);}
.tf-dc.zero{background:rgba(255,87,87,0.12);border-color:var(--red);color:var(--red);box-shadow:0 0 0 2px rgba(255,87,87,0.3);}
.tf-dc .dn{font-size:10px;line-height:1;}
.tf-dc .mi{font-size:8px;margin-top:1px;opacity:.9;}
.tf-pay-list{list-style:none;}
.tf-pay-list li{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);}
.tf-pay-list li:last-child{border-bottom:none;}
.tf-pmeta{color:var(--muted);font-size:11px;margin-top:2px;}
.tf-pamt{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--green);}
.tf-del{background:none;border:none;cursor:pointer;color:var(--muted2);font-size:12px;margin-left:8px;padding:2px 6px;border-radius:6px;}
.tf-del:hover{color:var(--red);background:rgba(255,87,87,0.1);}
.tf-add-row{display:flex;gap:7px;padding:10px 12px;background:var(--surface2);border-top:1px dashed var(--border2);flex-wrap:wrap;}
.tf-add-row input{flex:1;min-width:80px;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface3);color:var(--text);outline:none;font-family:var(--body);}
.tf-add-row input:focus{border-color:var(--accent);}
.tf-add-row button{padding:7px 14px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;font-family:var(--mono);}
.tf-btable{width:100%;border-collapse:collapse;font-size:12px;}
.tf-btable th{background:#7C2D12;color:#FFE4B5;padding:8px 12px;text-align:left;font-size:11px;font-family:var(--mono);}
.tf-btable td{padding:9px 12px;border-bottom:1px solid var(--border);font-family:var(--mono);}
.tf-btable tr:last-child td{border-bottom:none;}
.tf-bamt{font-weight:700;}.tf-bdue{color:var(--red);}.tf-bpaid{color:var(--green);}
.tf-legend{display:flex;flex-wrap:wrap;gap:8px;padding:6px 10px 12px;font-size:11px;color:var(--muted);}
.tf-li{display:flex;align-items:center;gap:5px;}
.tf-ld{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;}
/* ── SECTION NAV ── */
.sec-nav{display:flex;align-items:center;gap:0;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
.sec-nav::-webkit-scrollbar{display:none;}
.sec-btn{font-family:var(--mono);font-size:11px;font-weight:700;padding:11px 18px;background:transparent;border:none;border-bottom:2.5px solid transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.8px;}
.sec-btn:hover{color:var(--text);}
.sec-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.sidebar.hidden{display:none;}
@media(max-width:700px){
  .topbar{padding:0 12px;}
  .topbar-brand{display:none;}
  .sec-btn{padding:10px 12px;font-size:10px;}
  .sidebar{display:none !important;}
  .main{padding:14px;}
  .summary-row{grid-template-columns:repeat(3,1fr);}
  .topics-header,.topic-row{grid-template-columns:1fr 60px 60px 60px;}
  .tf-sum{grid-template-columns:repeat(3,1fr);}
  .stat-item{padding:0 8px;min-width:60px;}
  .stat-val{font-size:14px;}
  .sch-sidebar{display:none;}
}
</style>
</head>

"CN":["OSI & TCP/IP Models","LAN Technologies - Ethernet, MAC","Data Link - Framing & Error Detection","Switching - Packet, Circuit, Virtual","Routing Algorithms","Distance Vector Routing","Link State Routing","IPv4 Addressing & Subnetting","CIDR","ARP, DHCP, ICMP, NAT","Flow Control & Congestion Control","UDP","TCP","Application Layer - DNS, SMTP, HTTP, FTP"],

};
const ACTIONS=['Study','PYQ','Practice'],TESTS=['Test 1','Test 2','Test 3'],MOCK_COUNT=60;

// ── STATE ──
let SB=null,user=null,isSignup=false,db={},view='home',section='subjects';
let pendingSaves={},saveTimer=null,toastTimer=null,appReady=false,isAdmin=false;

// ── INIT ──
window.addEventListener('DOMContentLoaded',async()=>{
  SB=window.supabase.createClient(SUPA_URL,SUPA_KEY);
  // INITIAL_SESSION fires on every page load/refresh with existing session
  // SIGNED_IN fires on fresh login
  SB.auth.onAuthStateChange(async(event,session)=>{
    if((event==='INITIAL_SESSION'||event==='SIGNED_IN')&&session?.user&&!appReady){
      user=session.user;appReady=true;await loadAndRender();
    }
    if(event==='SIGNED_OUT'){user=null;db={};appReady=false;isAdmin=false;}
  });
});

async function loadAndRender(){
  try{await loadData();}catch(e){console.error(e);}
  // Check admin role from Supabase
  try{
    const{data}=await SB.from('user_roles').select('role').eq('user_id',user.id).single();
    isAdmin=data?.role==='admin';
  }catch(e){isAdmin=false;}

  setMsg('','');
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('secNav').style.display='flex';
  if(isAdmin) document.getElementById('snb-tiffin').style.display='inline-block';

  const displayName=db['user_name']||user.email.split('@')[0];
  document.getElementById('userInitial').textContent=displayName[0].toUpperCase();
  document.getElementById('userName').textContent=displayName;
  document.getElementById('userChip').style.display='flex';
  document.getElementById('logoutBtn').style.display='inline-block';
  renderTopbar();
  switchSection('subjects');
}

// ── SECTION SWITCHING ──
function switchSection(sec){
  section=sec;
  // Update nav buttons
  ['subjects','mocks','schedule','tiffin'].forEach(s=>{
    const b=document.getElementById('snb-'+s);
    if(b) b.classList.toggle('active',s===sec);
  });
  // Show/hide sidebar (only for subjects)
  const sb=document.getElementById('sidebar');
  if(sec==='subjects'){
    sb.classList.remove('hidden');
    view='home';renderSidebar();renderHome();
  } else {
    sb.classList.add('hidden');
    if(sec==='mocks'){view='mocks';renderMocks();}
    else if(sec==='schedule'){view='schedule';renderSchedule();}
    else if(sec==='tiffin'&&isAdmin){view='tiffin';renderTiffin();}
  }
}

// ── AUTH ──
function toggleMode(){
  isSignup=!isSignup;
  document.getElementById('authSub').textContent=isSignup?'Create your account':'Sign in to track your progress';
  document.getElementById('authBtn').textContent=isSignup?'Create Account':'Login';
  document.getElementById('modeBtn').textContent=isSignup?'Back to Login':'Sign Up';
  document.getElementById('nameGroup').style.display=isSignup?'block':'none';
  setMsg('','');
}

async function doAuth(){
  const email=document.getElementById('fEmail').value.trim();
  const pass=document.getElementById('fPass').value;
  const name=document.getElementById('fName').value.trim();
  if(!email){document.getElementById('fEmail').classList.add('err');setMsg('Email is required','err');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){document.getElementById('fEmail').classList.add('err');setMsg('Enter a valid email address','err');return;}
  if(!pass){document.getElementById('fPass').classList.add('err');setMsg('Password is required','err');return;}
  if(isSignup&&pass.length<6){document.getElementById('fPass').classList.add('err');setMsg('Password must be at least 6 characters','err');return;}
  if(isSignup&&!name){document.getElementById('fName').classList.add('err');setMsg('Please enter your name','err');return;}
  const btn=document.getElementById('authBtn');
  btn.disabled=true;btn.textContent=isSignup?'Creating...':'Signing in...';setMsg('','');
  try{
    if(isSignup){
      const{data,error}=await SB.auth.signUp({email,password:pass});
      if(error)throw error;
      if(name)localStorage.setItem('gate_pending_name',name);
      if(data?.session){setMsg('Account created! Loading…','ok');}
      else{setMsg('✅ Check your email to confirm, then log in.','ok');isSignup=false;document.getElementById('nameGroup').style.display='none';document.getElementById('modeBtn').textContent='Sign Up';btn.textContent='Login';}
    }else{
      const{data,error}=await SB.auth.signInWithPassword({email,password:pass});
      if(error)throw error;
      setMsg('Welcome! Loading…','ok');
    }
  }catch(e){setMsg(e.message||'Login failed. Check your credentials.','err');}
  finally{btn.disabled=false;if(btn.textContent.includes('...'))btn.textContent=isSignup?'Create Account':'Login';}
}

async function doLogout(){
  if(!confirm('Log out?'))return;
  appReady=false;
  await SB.auth.signOut();
  user=null;db={};isAdmin=false;
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('secNav').style.display='none';
  document.getElementById('userChip').style.display='none';
  document.getElementById('logoutBtn').style.display='none';
  document.getElementById('fEmail').value='';document.getElementById('fPass').value='';
  isSignup=false;setMsg('','');
  document.getElementById('nameGroup').style.display='none';
  document.getElementById('authBtn').textContent='Login';
  document.getElementById('modeBtn').textContent='Sign Up';
  document.getElementById('main').innerHTML='';
  document.getElementById('sidebar').innerHTML='';
  document.getElementById('topbarStats').innerHTML='';
}

function setMsg(t,type){const el=document.getElementById('authMsg');el.textContent=t;el.className='auth-msg'+(type?' '+type:'');}

// ── DATA ──
function get(k){return db[k];}
function set(k,v){db[k]=v;pendingSaves[k]=v;clearTimeout(saveTimer);saveTimer=setTimeout(flushSaves,900);}
async function flushSaves(){
  const entries=Object.entries(pendingSaves);
  if(!entries.length||!user||!SB)return;
  pendingSaves={};showToast('Saving…','warn');
  const rows=entries.map(([key,value])=>({user_id:user.id,key,value,updated_at:new Date().toISOString()}));
  const{error}=await SB.from('progress').upsert(rows,{onConflict:'user_id,key'});
  if(error){console.error(error);showToast('Save failed ✗','');}
  else showToast('Saved ✓','ok');
}
async function loadData(){
  if(!user||!SB)return;
  const{data,error}=await SB.from('progress').select('key,value').eq('user_id',user.id);
  if(error){console.error(error);return;}
  db={};
  if(data)data.forEach(r=>{db[r.key]=r.value;});
  // Handle pending name from signup
  const pn=localStorage.getItem('gate_pending_name');
  if(pn&&!db['user_name']){db['user_name']=pn;pendingSaves['user_name']=pn;setTimeout(flushSaves,200);localStorage.removeItem('gate_pending_name');}
  console.log('Loaded',Object.keys(db).length,'keys');
}

function showToast(msg,type){
  clearTimeout(toastTimer);
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(type?' '+type:'');
  toastTimer=setTimeout(()=>{t.className='toast';},2200);
}

// ── HELPERS ──
function daysLeft(){const e=new Date(2027,1,5),t=new Date();t.setHours(0,0,0,0);return Math.ceil((e-t)/864e5);}
function sPct(s,j){const t=SUBJECTS[s];let d=0;t.forEach((_,i)=>{if(get(s+'_t_'+i+'_'+j))d++;});return{done:d,total:t.length,pct:t.length?Math.round(d/t.length*100):0};}
function sOverall(s){let d=0,t=0;SUBJECTS[s].forEach((_,i)=>ACTIONS.forEach((_,j)=>{t++;if(get(s+'_t_'+i+'_'+j))d++;}));TESTS.forEach((_,i)=>{t++;if(get(s+'_test_'+i))d++;});return t?Math.round(d/t*100):0;}
function gStats(){
  let sD=0,sT=0,pD=0,pT=0,rD=0,rT=0,tD=0,tT=0,mD=0;
  for(let s in SUBJECTS){const a=sPct(s,0),b=sPct(s,1),c=sPct(s,2);sD+=a.done;sT+=a.total;pD+=b.done;pT+=b.total;rD+=c.done;rT+=c.total;TESTS.forEach((_,i)=>{tT++;if(get(s+'_test_'+i))tD++;});}
  for(let i=1;i<=MOCK_COUNT;i++)if(get('mock_'+i))mD++;
  const p=(x,y)=>y?Math.round(x/y*100):0;
  return{study:p(sD,sT),pyq:p(pD,pT),pract:p(rD,rT),tests:p(tD,tT),mocks:Math.round(mD/MOCK_COUNT*100)};
}

// ── TOPBAR ──
function renderTopbar(){
  const st=gStats(),dl=daysLeft();
  const dlC=dl<=30?'var(--red)':dl<=90?'var(--orange)':'var(--accent)';
  document.getElementById('topbarStats').innerHTML=
    `<div class="stat-item"><div class="stat-val" style="color:${dlC}">${dl}</div><div class="stat-lbl">Days</div></div>`+
    `<div style="width:1px;background:var(--border);margin:10px 0;flex-shrink:0"></div>`+
    [['Study',st.study+'%'],['PYQ',st.pyq+'%'],['Practice',st.pract+'%'],['Tests',st.tests+'%'],['Mocks',st.mocks+'%']]
    .map(([l,v])=>`<div class="stat-item"><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`).join('');
}

// ── SIDEBAR (subjects only) ──
function renderSidebar(){

  h+=ni('home','◈ Dashboard',view==='home');

function ni(id,label,active,pct){
  const ring=pct!==undefined
    ?`<div class="nav-ring"><svg viewBox="0 0 28 28" width="28" height="28" style="position:absolute;inset:0;transform:rotate(-90deg)"><circle cx="14" cy="14" r="11" fill="none" stroke="var(--border2)" stroke-width="2.5"/><circle cx="14" cy="14" r="11" fill="none" stroke="${active?'var(--accent)':'var(--muted)'}" stroke-width="2.5" stroke-dasharray="${Math.round(2*Math.PI*11)}" stroke-dashoffset="${Math.round(2*Math.PI*11*(1-pct/100))}" stroke-linecap="round"/></svg><div class="nav-pct">${pct}</div></div>`
    :`<div style="width:10px;flex-shrink:0"></div>`;
  return `<div class="nav-item${active?' active':''}" onclick="navigate('${id}')">${ring}<span style="overflow:hidden;text-overflow:ellipsis">${label}</span></div>`;
}
function navigate(v){view=v;renderSidebar();v==='home'?renderHome():renderSubject(v);}

// ── SUBJECT ──
function renderSubject(s){
  const topics=SUBJECTS[s],p0=sPct(s,0),p1=sPct(s,1),p2=sPct(s,2);
  document.getElementById('main').innerHTML=`
    <div class="subject-header">
      <div class="subject-tag">Subject</div>
      <div class="subject-title">${s}</div>
      <div class="subject-meta">
        <div class="meta-badge blue">${topics.length} topics</div>
        <div class="meta-badge green">Study ${p0.pct}%</div>
        <div class="meta-badge orange">PYQ ${p1.pct}%</div>
      </div>
    </div>
    <div class="progress-row" id="progRow"></div>
    <div class="sec-title">Subject Tests</div>
    <div class="tests-row" id="testsRow"></div>
    <div class="sec-title" style="margin-top:20px">Topics</div>
    <div class="topics-header"><div>Topic</div><div style="text-align:center">Study</div><div style="text-align:center">PYQ</div><div style="text-align:center">Practice</div></div>
    <div id="topicsCont"></div>`;
  [['Study','study',p0],['PYQ','pyq',p1],['Practice','practice',p2]].forEach(([l,cls,p])=>{
    const c=document.createElement('div');c.className='prog-card';
    c.innerHTML=`<div class="prog-card-label">${l}</div><div class="prog-bar-bg"><div class="prog-bar-fill ${cls}" id="pb_${cls}" style="width:${p.pct}%"></div></div><div class="prog-pct" id="pp_${cls}">${p.pct}%</div><div class="prog-sub">${p.done}/${p.total} done</div>`;
    document.getElementById('progRow').appendChild(c);
  });
  TESTS.forEach((t,i)=>{
    const k=s+'_test_'+i,done=get(k)||false;
    const pill=document.createElement('div');
    pill.className='test-pill'+(done?' done':'');
    pill.innerHTML=`<div class="tp-check">${done?'✓':''}</div><span>${t}</span>`;
    pill.onclick=()=>{const v=!get(k);set(k,v);pill.className='test-pill'+(v?' done':'');pill.querySelector('.tp-check').textContent=v?'✓':'';renderTopbar();renderSidebar();};
    document.getElementById('testsRow').appendChild(pill);
  });
  topics.forEach((topic,i)=>{
    const states=ACTIONS.map((_,j)=>get(s+'_t_'+i+'_'+j)||false);
    const allDone=states.every(Boolean);
    const row=document.createElement('div');row.className='topic-row'+(allDone?' all-done':'');
    row.innerHTML=`<div class="topic-name">${allDone?'<span class="done-dot"></span>':''}${topic}</div>`;
    ACTIONS.forEach((_,j)=>{
      const k=s+'_t_'+i+'_'+j,cls=['study','pyq','practice'][j];
      const cell=document.createElement('div');cell.className='action-cell';
      const cb=document.createElement('input');cb.type='checkbox';cb.className=`action-cb ${cls}-cb`;cb.checked=states[j];
      cb.onchange=()=>{
        set(k,cb.checked);
        const ns=ACTIONS.map((_,jj)=>get(s+'_t_'+i+'_'+jj)||false),ad=ns.every(Boolean);
        row.className='topic-row'+(ad?' all-done':'');
        const nd=row.querySelector('.topic-name');
        if(ad&&!nd.querySelector('.done-dot')){const d=document.createElement('span');d.className='done-dot';nd.prepend(d);}
        else if(!ad)nd.querySelector('.done-dot')?.remove();
        [0,1,2].forEach(idx=>{const p=sPct(s,idx),c=['study','pyq','practice'][idx];const b=document.getElementById('pb_'+c),pp=document.getElementById('pp_'+c);if(b)b.style.width=p.pct+'%';if(pp)pp.textContent=p.pct+'%';});
        renderTopbar();renderSidebar();
      };
      cell.appendChild(cb);row.appendChild(cell);
    });
    document.getElementById('topicsCont').appendChild(row);
  });
}

// ── MOCKS ──
function renderMocks(){
  const scores=[];
  for(let i=1;i<=MOCK_COUNT;i++){const m=get('mark_'+i);if(get('mock_'+i)&&m!==''&&m!==null&&m!==undefined)scores.push({n:i,s:parseFloat(m)||0});}
  const avg=scores.length?Math.round(scores.reduce((a,x)=>a+x.s,0)/scores.length):null;
  const best=scores.length?Math.max(...scores.map(x=>x.s)):null;
  const last3=scores.slice(-3);
  const trend=last3.length>=2?(last3[last3.length-1].s>last3[0].s?'up':last3[last3.length-1].s<last3[0].s?'down':'flat'):'flat';
  const trendLabel={'up':'↑ Improving','down':'↓ Declining','flat':'→ Stable'}[trend];
  let done=0;for(let i=1;i<=MOCK_COUNT;i++)if(get('mock_'+i))done++;
  document.getElementById('main').innerHTML=`
    <div style="font-family:var(--display);font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px">Mock Tests</div>
    <div style="font-family:var(--mono);font-size:13px;color:var(--muted);margin-bottom:20px">${done}/${MOCK_COUNT} completed</div>
    <div class="graph-wrap">
      <div class="graph-title">Score Trend (out of 100) ${scores.length>=2?`<span class="graph-trend ${trend}">${trendLabel}</span>`:''}</div>
      <div class="graph-area">${scores.length>=2?`<canvas id="mockGraph"></canvas>`:`<div class="graph-empty">Complete at least 2 mocks with scores to see the graph</div>`}</div>
      ${scores.length>=1?`<div class="graph-stats">
        <div class="gstat"><div class="gstat-val" style="color:var(--accent)">${avg}</div><div class="gstat-lbl">Average</div></div>
        <div class="gstat"><div class="gstat-val" style="color:var(--green)">${best}</div><div class="gstat-lbl">Best</div></div>
        <div class="gstat"><div class="gstat-val" style="color:var(--blue)">${scores[scores.length-1].s}</div><div class="gstat-lbl">Latest</div></div>
        <div class="gstat"><div class="gstat-val" style="color:var(--orange)">${scores.length}</div><div class="gstat-lbl">Scored</div></div>
      </div>`:''}
    </div>
    <div class="sec-title">All Mocks</div>
    <div class="mocks-grid" id="mocksGrid"></div>`;
  if(scores.length>=2){setTimeout(()=>{
    const canvas=document.getElementById('mockGraph');if(!canvas)return;
    const dpr=window.devicePixelRatio||1,W=canvas.parentElement.clientWidth,H=canvas.parentElement.clientHeight;
    canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
    const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
    const pad={l:36,r:16,t:16,b:28},gw=W-pad.l-pad.r,gh=H-pad.t-pad.b;
    const vals=scores.map(x=>x.s),minV=Math.max(0,Math.min(...vals)-10),maxV=Math.min(100,Math.max(...vals)+10);
    const xStep=gw/(scores.length-1),toX=i=>pad.l+i*xStep,toY=v=>pad.t+gh-(v-minV)/(maxV-minV)*gh;
    ctx.strokeStyle='rgba(31,37,53,1)';ctx.lineWidth=1;
    [0,25,50,75,100].forEach(v=>{if(v<minV||v>maxV)return;const y=toY(v);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+gw,y);ctx.stroke();ctx.fillStyle='#3d4560';ctx.font='9px JetBrains Mono';ctx.fillText(v,2,y+3);});
    const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+gh);grad.addColorStop(0,'rgba(74,158,255,0.25)');grad.addColorStop(1,'rgba(74,158,255,0)');
    ctx.beginPath();ctx.moveTo(toX(0),toY(scores[0].s));
    scores.forEach((sc,i)=>{if(i>0){const prev=scores[i-1];ctx.bezierCurveTo((toX(i-1)+toX(i))/2,toY(prev.s),(toX(i-1)+toX(i))/2,toY(sc.s),toX(i),toY(sc.s));}});
    ctx.lineTo(toX(scores.length-1),toY(minV));ctx.lineTo(toX(0),toY(minV));ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    ctx.beginPath();ctx.strokeStyle='#4a9eff';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
    scores.forEach((sc,i)=>{if(i===0)ctx.moveTo(toX(0),toY(sc.s));else{const prev=scores[i-1];ctx.bezierCurveTo((toX(i-1)+toX(i))/2,toY(prev.s),(toX(i-1)+toX(i))/2,toY(sc.s),toX(i),toY(sc.s));}});ctx.stroke();
    scores.forEach((sc,i)=>{const x=toX(i),y=toY(sc.s),isLast=i===scores.length-1;ctx.beginPath();ctx.arc(x,y,isLast?5:3.5,0,Math.PI*2);ctx.fillStyle=isLast?'#e8ff47':'#4a9eff';ctx.fill();if(isLast){ctx.strokeStyle='#090b10';ctx.lineWidth=1.5;ctx.stroke();}if(isLast||sc.s===best){ctx.fillStyle='#dde2f0';ctx.font='bold 9px JetBrains Mono';ctx.fillText(sc.s,x-8,y-8);}});
  },50);}
  const grid=document.getElementById('mocksGrid');
  for(let i=1;i<=MOCK_COUNT;i++){
    const k1='mock_'+i,k2='mark_'+i,isDone=get(k1)||false,marks=get(k2)??'';
    const card=document.createElement('div');card.className='mock-card'+(isDone?' done':'');
    const cb=document.createElement('input');cb.type='checkbox';cb.className='mock-cb';cb.checked=isDone;
    cb.onchange=()=>{set(k1,cb.checked);card.className='mock-card'+(cb.checked?' done':'');let dc=0;for(let x=1;x<=MOCK_COUNT;x++)if(get('mock_'+x))dc++;renderTopbar();setTimeout(renderMocks,1200);};
    const num=document.createElement('div');num.className='mock-num';num.textContent='Mock '+String(i).padStart(2,'0');
    const inp=document.createElement('input');inp.type='number';inp.className='mock-marks';inp.placeholder='/100';inp.value=marks;inp.min=0;inp.max=100;
    inp.oninput=()=>{set(k2,inp.value);};inp.onblur=()=>setTimeout(renderMocks,1200);
    card.appendChild(cb);card.appendChild(num);card.appendChild(inp);grid.appendChild(card);
  }
}

// ── SCHEDULE ──
const SCH_SUBJECTS=[
  {subject:'TOC',month:4,days:[9,10,11]},{subject:'COA',month:4,days:[16,17,18,19,20]},
  {subject:'OS',month:4,days:[28,29,30,31]},{subject:'CD',month:5,days:[3,4]},
  {subject:'DBMS',month:5,days:[10,11,12,13,14]},{subject:'CN',month:5,days:[20,21,22,23,24]},
  {subject:'C',month:5,days:[29,30]},{subject:'DSA',month:6,days:[8,9,10,11,12]},
  {subject:'EM',month:6,days:[18,19,20,21,22]},{subject:'DM',month:7,days:[1,2,3,4,5,6]},
];
const SCH_TESTS=[
  {name:'2026 Set 2',month:6,day:1,isZeal:false},{name:'2026 Set 1',month:6,day:3,isZeal:false},
  {name:'Zeal Mock 1',month:6,day:5,isZeal:true},{name:'2025 Set 2',month:6,day:7,isZeal:false},
  {name:'2025 Set 1',month:6,day:9,isZeal:false},{name:'Zeal Mock 2',month:6,day:11,isZeal:true},
  {name:'2024 Set 2',month:6,day:13,isZeal:false},{name:'2024 Set 1',month:6,day:15,isZeal:false},
  {name:'Zeal Mock 3',month:6,day:17,isZeal:true},{name:'2023',month:6,day:19,isZeal:false},
  {name:'2022',month:6,day:21,isZeal:false},{name:'Zeal Mock 4',month:6,day:23,isZeal:true},
  {name:'2021 Set 2',month:6,day:25,isZeal:false},{name:'2021 Set 1',month:6,day:27,isZeal:false},
  {name:'Zeal Mock 5',month:6,day:29,isZeal:true},{name:'2020',month:6,day:31,isZeal:false},
  {name:'2019',month:7,day:2,isZeal:false},{name:'Zeal Mock 6',month:7,day:4,isZeal:true},
  {name:'2018',month:7,day:6,isZeal:false},{name:'2017',month:7,day:8,isZeal:false},
  {name:'Zeal Mock 7',month:7,day:10,isZeal:true},{name:'2016',month:7,day:12,isZeal:false},
  {name:'2015',month:7,day:14,isZeal:false},{name:'Zeal Mock 8',month:7,day:16,isZeal:true},
];
const SCH_MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const SCH_DOWS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function schDK(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function buildSchMap(){
  const map={};
  SCH_SUBJECTS.forEach(s=>s.days.forEach(d=>{const k=schDK(2026,s.month,d);if(!map[k])map[k]=[];map[k].push({id:k+'_'+s.subject,name:s.subject,type:'subject',isZeal:false});}));
  SCH_TESTS.forEach(t=>{const k=schDK(2026,t.month,t.day);if(!map[k])map[k]=[];map[k].push({id:k+'_'+t.name.replace(/ /g,'_'),name:t.name,type:t.isZeal?'zeal':'test',isZeal:t.isZeal});});
  return map;
}
const schMap=buildSchMap();
function schGet(id){return db['sch_'+id]||false;}
function schSet(id,val){set('sch_'+id,val);}
function schToggle(id){schSet(id,!schGet(id));renderSchedule();}
function schStreak(){let n=0;const today=new Date();today.setHours(0,0,0,0);for(let i=0;i<365;i++){const d=new Date(today);d.setDate(d.getDate()-i);const k=schDK(d.getFullYear(),d.getMonth(),d.getDate());const tasks=schMap[k]||[];if(tasks.length&&tasks.every(t=>schGet(t.id)))n++;else if(i>0)break;}return n;}
function schProg(){const all=Object.values(schMap).flat();return{total:all.length,done:all.filter(t=>schGet(t.id)).length};}
function schBacklog(){const today=new Date();today.setHours(0,0,0,0);const items=[];Object.entries(schMap).forEach(([key,tasks])=>{const[y,m,d]=key.split('-').map(Number);const date=new Date(y,m-1,d);date.setHours(0,0,0,0);if(date<today)tasks.forEach(t=>{if(!schGet(t.id))items.push({key,date,task:t});});});return items.sort((a,b)=>b.date-a.date).slice(0,15);}
function renderSchedule(){
  const p=schProg(),pct=p.total?Math.round(p.done/p.total*100):0;
  const streak=schStreak(),dl=daysLeft(),dlC=dl<=30?'var(--red)':dl<=90?'var(--orange)':'var(--accent)';
  const backlog=schBacklog();
  const pillNames=['TOC','COA','OS','CD','DBMS','CN','C','DSA','EM','DM','Zeal Mocks','Tests'];
  const pillsHTML=pillNames.map(s=>{let cnt=0,dn=0;Object.values(schMap).flat().forEach(t=>{const m=s==='Zeal Mocks'?t.isZeal:s==='Tests'?t.type==='test':t.name===s;if(m){cnt++;if(schGet(t.id))dn++;}});return `<div class="sch-pill"><span>${s}</span><span class="sch-pill-count">${dn}/${cnt}</span></div>`;}).join('');
  const backlogHTML=backlog.length?`<div class="backlog-box"><div class="backlog-title">🔴 Backlog — ${backlog.length} missed task${backlog.length>1?'s':''}</div>`+backlog.map(b=>`<div class="backlog-item" onclick="openSchModal('${b.key}')"><span style="color:var(--red);font-size:10px;font-family:var(--mono)">${b.key}</span><span>${b.task.name}</span><span style="font-size:10px;color:var(--muted)">${b.task.type}</span></div>`).join('')+'</div>':'';
  document.getElementById('main').innerHTML=`
    <div class="sch-topbar">
      <div style="font-family:var(--display);font-size:11px;font-weight:800;color:var(--muted);letter-spacing:2px;text-transform:uppercase">Study Schedule</div>
      <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;">
        <div class="sch-stat"><div class="sch-stat-val" style="color:${dlC}">${dl}</div><div class="sch-stat-lbl">Days Left</div></div>
        <div class="sch-stat"><div class="sch-stat-val" style="color:var(--orange)">🔥 ${streak}</div><div class="sch-stat-lbl">Streak</div></div>
        <div class="sch-progress-wrap"><div style="font-family:var(--mono);font-size:11px;color:var(--muted)">${pct}% done</div><div class="sch-pbar"><div class="sch-pbar-fill" style="width:${pct}%"></div></div><div class="sch-pbar-lbl">${p.done} / ${p.total} tasks</div></div>
      </div>
    </div>
    ${backlogHTML}
    <div class="sch-layout"><div class="sch-sidebar"><div class="sch-sidebar-title">Subjects</div>${pillsHTML}</div><div class="sch-main" id="schCalWrap"></div></div>`;
  const wrap=document.getElementById('schCalWrap'),today=new Date();today.setHours(0,0,0,0);
  [[2026,4],[2026,5],[2026,6],[2026,7]].forEach(([y,m])=>wrap.appendChild(buildSchMonth(y,m,today)));
}
function buildSchMonth(year,month,today){
  const sec=document.createElement('div');sec.className='month-section';
  const tc=Object.entries(schMap).filter(([k])=>{const[y,m]=k.split('-').map(Number);return y===year&&m-1===month;}).reduce((a,[,v])=>a+v.length,0);
  const hdr=document.createElement('div');hdr.className='month-hdr';hdr.innerHTML=`${SCH_MONTHS[month]} <span>${year} · ${tc} tasks</span>`;sec.appendChild(hdr);
  const grid=document.createElement('div');grid.className='cal-grid';
  SCH_DOWS.forEach(d=>{const el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);});
  const firstDay=new Date(year,month,1).getDay(),dim=new Date(year,month+1,0).getDate();
  for(let i=0;i<firstDay;i++){const el=document.createElement('div');el.className='cal-day empty';grid.appendChild(el);}
  for(let d=1;d<=dim;d++){
    const key=schDK(year,month,d),cd=new Date(year,month,d);cd.setHours(0,0,0,0);
    const isPast=cd<today,isToday=cd.getTime()===today.getTime(),tasks=schMap[key]||[],allDone=tasks.length>0&&tasks.every(t=>schGet(t.id));
    const cell=document.createElement('div');cell.className='cal-day'+(isToday?' is-today':'')+(isPast?' is-past':'')+(allDone?' all-done':'');
    if(isToday){const dot=document.createElement('div');dot.className='today-dot';cell.appendChild(dot);}
    const num=document.createElement('div');num.className='cal-day-num';num.textContent=d;cell.appendChild(num);
    tasks.forEach(t=>{const chip=document.createElement('div');chip.className='task-chip '+t.type+(schGet(t.id)?' done':'');chip.textContent=t.name;chip.title=t.name;chip.onclick=e=>{e.stopPropagation();schToggle(t.id);};cell.appendChild(chip);});
    if(tasks.length){const ck=key;cell.onclick=()=>openSchModal(ck);}
    grid.appendChild(cell);
  }
  sec.appendChild(grid);return sec;
}
function openSchModal(key){
  const tasks=schMap[key]||[],parts=key.split('-').map(Number);
  document.getElementById('schModalDate').textContent=SCH_MONTHS[parts[1]-1]+' '+parts[2]+', '+parts[0];
  document.getElementById('schModalTitle').textContent=tasks.length+' Task'+(tasks.length!==1?'s':'');
  document.getElementById('schModalTasks').innerHTML=tasks.map(t=>`<div class="sch-modal-task${schGet(t.id)?' done':''}" onclick="schToggle('${t.id}');setTimeout(()=>openSchModal('${key}'),80)"><div class="sch-check">${schGet(t.id)?'✓':''}</div><div style="font-size:13px;flex:1">${t.name}</div><div style="font-size:10px;color:var(--muted);font-family:var(--mono)">${t.type}</div></div>`).join('');
  document.getElementById('schModal').classList.add('open');
}
function closeSchModal(){document.getElementById('schModal').classList.remove('open');}
document.addEventListener('click',e=>{if(e.target.id==='schModal')closeSchModal();});

// ── TIFFIN (admin only) ──
const TF_RATE=50;
const TF_MONTHS=[{yr:2026,mo:4,label:'May 2026',startDay:8,endDay:31},{yr:2026,mo:5,label:'June 2026',startDay:1,endDay:6}];
const TF_DOWS=['Su','Mo','Tu','We','Th','Fr','Sa'];
function tfDS(yr,mo,d){return yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function tfToday(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function tfGet(k){return db['tf_'+k]||null;}
function tfSet(k,v){set('tf_'+k,v);}
function tfGetMeals(){const m={};Object.keys(db).filter(k=>k.startsWith('tf_meal_')).forEach(k=>{m[k.replace('tf_meal_','')]=db[k];});return m;}
function tfGetPayments(){try{return JSON.parse(db['tf_payments']||'[]');}catch(e){return[];}}
function tfSavePayments(arr){set('tf_payments',JSON.stringify(arr));}
function tfMealCost(m){if(m==='both')return 100;if(m==='morning'||m==='evening')return 50;return 0;}
function tfCycle(k){
  const c=['none','morning','evening','both'],meals=tfGetMeals();
  const cur=meals[k]||'none';
  tfSet('meal_'+k,c[(c.indexOf(cur)+1)%c.length]);
  renderTiffin();
}
function tfAddPay(){
  const amt=parseFloat(document.getElementById('tfAmt').value);
  const dt=document.getElementById('tfDt').value;
  if(!amt||amt<=0){showToast('Enter valid amount','');return;}
  if(!dt){showToast('Select a date','');return;}
  const pays=tfGetPayments();
  pays.push({id:Date.now(),date:dt,amount:amt,note:'Payment'});
  pays.sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('tfAmt').value='';
  tfSavePayments(pays);renderTiffin();showToast('Payment added ✓','ok');
}
function tfDelPay(id){
  const pays=tfGetPayments().filter(p=>p.id!==id);
  tfSavePayments(pays);renderTiffin();showToast('Removed','ok');
}
function tfFindZeroDay(meals,pays){
  const totalPaid=pays.reduce((s,p)=>s+p.amount,0);
  let spent=0;
  for(const mn of TF_MONTHS){
    for(let d=mn.startDay;d<=mn.endDay;d++){
      const k=tfDS(mn.yr,mn.mo,d);
      spent+=tfMealCost(meals[k]||'none');
      if(spent>=totalPaid)return{yr:mn.yr,mo:mn.mo,day:d};
    }
  }
  return null;
}
function renderTiffin(){
  const meals=tfGetMeals(),pays=tfGetPayments();
  const totalPaid=pays.reduce((s,p)=>s+p.amount,0);
  let totalUsed=0;
  TF_MONTHS.forEach(mn=>{for(let d=mn.startDay;d<=mn.endDay;d++)totalUsed+=tfMealCost(meals[tfDS(mn.yr,mn.mo,d)]||'none');});
  const bal=totalPaid-totalUsed;
  const todayStr=tfToday();
  const zero=tfFindZeroDay(meals,pays);

  const fmtAmt=n=>'₹'+Math.abs(n).toLocaleString('en-IN');
  const fmtDate=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});};

  let calHTML='';
  TF_MONTHS.forEach(mn=>{
    const{yr,mo,label,startDay,endDay}=mn;
    let mornings=0,evenings=0;
    for(let d=startDay;d<=endDay;d++){const m=meals[tfDS(yr,mo,d)];if(m==='morning'||m==='both')mornings++;if(m==='evening'||m==='both')evenings++;}
    const firstDay=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
    let cells=TF_DOWS.map(l=>`<div class="tf-dl">${l}</div>`).join('');
    for(let i=0;i<firstDay;i++)cells+=`<div class="tf-dc emp"></div>`;
    for(let d=1;d<=dim;d++){
      const k=tfDS(yr,mo,d);
      const isZero=zero&&zero.yr===yr&&zero.mo===mo&&zero.day===d;
      const meal=meals[k]||'none',beforeRange=d<startDay,afterRange=d>endDay,isFuture=k>todayStr;
      let cls,icon;
      if(beforeRange||afterRange){cls='bef';icon='';}
      else if(isFuture){cls='fut';icon='';}
      else if(isZero){cls='zero';icon=meal==='morning'?'M':meal==='evening'?'E':meal==='both'?'M+E':'✓';}
      else if(meal==='morning'){cls='mor';icon='M';}
      else if(meal==='evening'){cls='eve';icon='E';}
      else if(meal==='both'){cls='bot';icon='M+E';}
      else{cls='non';icon='';}
      const clickable=!beforeRange&&!afterRange&&!isFuture;
      cells+=`<div class="tf-dc ${cls}"${clickable?` onclick="tfCycle('${k}')" title="Tap to toggle"`:''}><div class="dn">${d}</div>${icon?`<div class="mi">${icon}</div>`:''}</div>`;
    }
    calHTML+=`<div class="tf-card"><div class="tf-mhdr"><span>${label}</span><span>☀️${mornings} · 🌙${evenings} · ${fmtAmt((mornings+evenings)*50)}</span></div><div class="tf-dgrid">${cells}</div></div>`;
  });

  let billRows='';
  TF_MONTHS.forEach(mn=>{
    const{yr,mo,label,startDay,endDay}=mn;
    let m=0,e=0;
    for(let d=startDay;d<=endDay;d++){const meal=meals[tfDS(yr,mo,d)];if(meal==='morning'||meal==='both')m++;if(meal==='evening'||meal==='both')e++;}
    const amt=(m+e)*TF_RATE;
    const moStr=yr+'-'+String(mo+1).padStart(2,'0');
    const paidMo=pays.filter(p=>p.date.startsWith(moStr)).reduce((s,p)=>s+p.amount,0);
    const b=paidMo-amt;
    billRows+=`<tr><td>${label}</td><td>${m}</td><td>${e}</td><td class="tf-bamt">${fmtAmt(amt)}</td><td class="tf-bamt tf-bpaid">${fmtAmt(paidMo)}</td><td class="tf-bamt ${b<0?'tf-bdue':'tf-bpaid'}">${b<0?'-':'+'}${fmtAmt(b)}</td></tr>`;
  });

  document.getElementById('main').innerHTML=`
    <div class="tf-topbar"><h2>🍱 Tiffin Tracker</h2><p>From 8 May 2026 (Evening) &nbsp;·&nbsp; ₹50 Morning + ₹50 Evening</p></div>
    <div class="tf-sum">
      <div class="tf-sc"><div class="tf-sv">${fmtAmt(totalPaid)}</div><div class="tf-sl">Total Paid</div></div>
      <div class="tf-sc"><div class="tf-sv r">${fmtAmt(totalUsed)}</div><div class="tf-sl">Total Used</div></div>
      <div class="tf-sc"><div class="tf-sv ${bal<0?'r':'g'}">${bal<0?'-':'+'}${fmtAmt(bal)}</div><div class="tf-sl">Remaining</div></div>
    </div>
    <div class="tf-sec-title">💰 Payments</div>
    <div class="tf-card">
      <ul class="tf-pay-list" id="tfPayList">
        ${pays.map(p=>`<li><div><div style="font-weight:600">${p.note||'Payment'}</div><div class="tf-pmeta">${fmtDate(p.date)}</div></div><div style="display:flex;align-items:center"><span class="tf-pamt">${fmtAmt(p.amount)}</span><button class="tf-del" onclick="tfDelPay(${p.id})">✕</button></div></li>`).join('')}
      </ul>
      <div class="tf-add-row">
        <input type="number" id="tfAmt" placeholder="₹ Amount" min="1">
        <input type="date" id="tfDt" value="${todayStr}">
        <button onclick="tfAddPay()">+ Add</button>
      </div>
    </div>
    <div class="tf-sec-title">📅 Tiffin Log</div>
    ${calHTML}
    <div class="tf-sec-title">🧾 Bill Summary</div>
    <div class="tf-card">
      <table class="tf-btable">
        <thead><tr><th>Month</th><th>☀️M</th><th>🌙E</th><th>Amount</th><th>Paid</th><th>Balance</th></tr></thead>
        <tbody>${billRows}</tbody>
      </table>
    </div>
    <div class="tf-legend">
      <div class="tf-li"><div class="tf-ld" style="background:rgba(57,229,137,0.5)"></div>Morning</div>
      <div class="tf-li"><div class="tf-ld" style="background:rgba(255,215,0,0.5)"></div>Evening</div>
      <div class="tf-li"><div class="tf-ld" style="background:rgba(74,158,255,0.5)"></div>Both</div>
      <div class="tf-li"><div class="tf-ld" style="background:rgba(255,87,87,0.5)"></div>Balance ends</div>
    </div>`;
}
</script>

<div class="sch-modal-overlay" id="schModal">
  <div class="sch-modal">
    <div class="sch-modal-date" id="schModalDate"></div>
    <div class="sch-modal-title" id="schModalTitle"></div>
    <div id="schModalTasks"></div>
    <button class="sch-modal-close" onclick="closeSchModal()">Close</button>
  </div>
</div>
</body>
</html>
